<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羊皮纸冒险 - 文字游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Georgia', 'Times New Roman', serif; }
        body { background-color: #2c1e16; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .game-container {
            width: 100%; max-width: 1200px; aspect-ratio: 16 / 10.5;
            background-color: #d5c1a5; background-image: url('bg.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); border-radius: 10px;
            position: relative; overflow: hidden; z-index: 0;
        }
        .ink-text { color: #3b2416; text-shadow: 0 1px 3px rgba(255, 255, 255, 0.9), 0 2px 5px rgba(255, 255, 255, 0.8); }

        /* 头部 */
        .game-title { position: absolute; top: 4.5%; left: 22.5%; font-size: 2.2rem; font-weight: bold; letter-spacing: 2px; transform: translateX(-50%); z-index: 10;}
        .time-system { position: absolute; top: 4.5%; right: 6%; font-size: 1rem; display: flex; gap: 15px; background: rgba(255, 248, 230, 0.7); padding: 6px 15px; border-radius: 30px; border: 1px solid #a07a52; z-index: 10;}

        /* 左侧角色 */
        .left-panel { position: absolute; top: 45%; left: 5%; width: 28%; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .lvl-text { font-size: 1.1rem; font-weight: bold; }
        .stat-row { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold; }
        .stat-bar-bg { width: 100%; height: 10px; background: rgba(74, 46, 26, 0.4); border-radius: 6px; overflow: hidden; margin-top: 2px; }
        .stat-bar-fill { height: 100%; background: #d35e4a; width: 80%; border-radius: 6px;}

        /* 右侧房间框架（已删除图片） */
        .right-room-box {
            position: absolute; top: 10%; right: 5.5%; width: 46%; height: 42%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
            border-radius: 8px; background: rgba(255, 248, 230, 0.3); border: 1px solid rgba(90, 56, 32, 0.4); z-index: 10;
        }
        .right-room-box .room-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .right-room-box .room-desc { font-size: 1.1rem; text-align: center; line-height: 1.6; }

        /* 右侧功能按钮 (移动/返回) */
        .right-bottom-panel { position: absolute; top: 55%; right: 5.5%; width: 46%; height: 14%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; z-index: 10; }
        .btn-exit { background: #6b4423; color: #efe0c9; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: bold; box-shadow: inset 0 2px 0px #8f633d; text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
        .btn-exit:hover { background: #3b2416; transform: translateY(-2px); }
        .btn-back { background: #8b6240; }

        /* ===== 布局重新分配：删除了输入框，重新调整了下方 ===== */

        /* 1. 底部功能菜单 (往上放一点) */
        .footer-menu {
            position: absolute; bottom: 9%; left: 50%; transform: translateX(-50%);
            width: 95%; display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; z-index: 10;
        }
        .menu-btn {
            background: rgba(255,248,230,0.85); border: 2px solid #5a3820; color: #3b2416;
            padding: 6px 14px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
            transition: all 0.2s; border-radius: 4px; box-shadow: 2px 2px 0px #75563b;
        }
        .menu-btn:hover { background: #5a3820; color: #fff; transform: translate(2px, 2px); box-shadow: none; }

        /* 2. 状态解释栏 (放到最下面，解决遮挡问题) */
        .log-area {
            position: absolute; bottom: 2%; left: 50%; transform: translateX(-50%);
            width: 70%; height: 30px; text-align: center; font-size: 0.9rem;
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
            background: rgba(255, 248, 230, 0.8); /* 加厚背景，确保清晰 */
            padding: 5px 15px; border-radius: 20px;
            border: 1px solid #5a3820; /* 加一圈边框让其更明显 */
            z-index: 10;
        }

        /* 弹窗系统 */
        .panel-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 9999; border-radius: 10px; }
        .panel-overlay.open { display: flex; }
        .panel-content { background: #e8d5b5; max-width: 600px; width: 90%; padding: 25px; border: 10px solid #a07a52; box-shadow: 0 10px 30px rgba(0,0,0,0.8); max-height: 80vh; overflow-y: auto; position: relative; border-radius: 6px; }
        .panel-content h2 { border-bottom: 2px solid #75563b; padding-bottom: 10px; margin-bottom: 15px; color: #2a170d; }
        .close-panel { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; cursor: pointer; color: #5a3820; }
        .list-item { background: rgba(255,255,255,0.5); padding: 10px; margin-bottom: 10px; border-left: 4px solid #8b6240; }
        .list-item button { background: #5a3820; color: #fff; border: none; padding: 4px 12px; cursor: pointer; float: right; }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <div class="game-title ink-text">羊皮纸冒险</div>
    <div class="time-system">
        <span>📅 第 <b id="day-count">1</b> 天</span>
        <span>⏳ <b id="time-status">清晨</b></span>
        <span>🏆 <b id="achieve-count">0</b></span>
    </div>
    <div class="left-panel">
        <div class="lvl-text ink-text"><b>Lv.<span id="player-level">1</span> 勇者</b></div>
        <div class="stats-bar">
            <div class="stat-row ink-text"><span>❤️ 生命</span><span id="hp-text">80/100</span></div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" id="hp-bar" style="width: 80%"></div></div>
        </div>
        <div class="ink-text" style="font-size: 0.85rem; margin-top: 5px; text-align: center;">已探索: <span id="room-count">1</span> / 10</div>
    </div>

    <div class="right-room-box">
        <div class="room-title ink-text" id="room-title">中央大厅</div>
        <div class="room-desc ink-text" id="room-desc">宏伟的石制大厅，壁炉里的火焰噼啪作响。</div>
    </div>

    <div class="right-bottom-panel">
        <div class="exits" id="exits-area">
            <button class="btn-exit" onclick="goToRoom('向北')">⬆ 北方</button>
            <button class="btn-exit" onclick="goToRoom('向东')">➡ 东方</button>
        </div>
        <button class="btn-exit btn-back" onclick="backRoom()">↩ 返回上一间</button>
    </div>

    <!-- ========= 已删除 输入执行栏 ========= -->

    <!-- 底部菜单往上放 -->
    <footer class="footer-menu">
        <button class="menu-btn" onclick="sendPanelCommand('查看地图')">🗺️ 地图系统</button>
        <button class="menu-btn" onclick="sendPanelCommand('查看背包')">🎒 背包系统</button>
        <button class="menu-btn" onclick="sendPanelCommand('查看任务')">📋 任务系统</button>
        <button class="menu-btn" onclick="sendPanelCommand('与NPC对话')">💬 NPC系统</button>
        <button class="menu-btn" onclick="sendPanelCommand('战斗')">⚔️ 战斗系统</button>
        <button class="menu-btn" onclick="sendPanelCommand('触发事件')">🎲 随机事件</button>
        <button class="menu-btn" onclick="sendPanelCommand('查看成就')">🏆 成就系统</button>
    </footer>

    <!-- 状态解释栏放到最底部 -->
    <div class="log-area ink-text" id="game-log">等待连接后端...</div>

    <div id="panel-overlay" class="panel-overlay">
        <div class="panel-content" id="panel-content">
            <span class="close-panel" onclick="togglePanel('close')">✖</span>
            <h2 id="panel-title">系统面板</h2>
            <div id="panel-body"></div>
        </div>
    </div>
</div>

<script>
    // =========================================================================
    // 【连接你真实的 Spring Boot 后端】
    // =========================================================================
    const BASE_URL = 'http://127.0.0.1:8080/game';

    async function apiCommand(input) {
        try {
            const body = new URLSearchParams();
            body.append('input', input);
            const response = await fetch(`${BASE_URL}/command`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body.toString()
            });
            return await response.json();
        } catch (error) {
            console.error('后端连接失败:', error);
            addLog("⚠️ 无法连接 Spring Boot 后端！请先运行 Java 项目。");
            return null;
        }
    }

    // =========================================================================
    // 【UI 渲染更新】
    // =========================================================================
    let tempInventory = [];

    function updateUI(data) {
        if (!data) return;
        if (data.hp !== undefined) {
            document.getElementById('player-level').innerText = data.level || 1;
            document.getElementById('hp-text').innerText = `${data.hp}/100`;
            document.getElementById('hp-bar').style.width = `${Math.min(100, data.hp)}%`;
        }
        if (data.room) {
            const titleMatch = data.room.match(/你在(.+?)。/);
            if (titleMatch && titleMatch[1]) {
                document.getElementById('room-title').innerText = titleMatch[1];
                document.getElementById('room-desc').innerText = data.room.replace(/你在(.+?)。/, '').trim();
            } else {
                document.getElementById('room-title').innerText = "当前房间";
                document.getElementById('room-desc').innerText = data.room;
            }
            addLog(`📍 ${data.room}`);
        }
        if (data.inventory) {
            tempInventory = data.inventory;
        }
    }

    // =========================================================================
    // 【核心交互动作】
    // =========================================================================
    // 既然删除了输入框，所有的交互只靠点击按钮触发

    function goToRoom(direction) { parseCommand(direction); }
    function backRoom() { parseCommand('返回'); }

    async function parseCommand(cmd) {
        addLog(`> 指令发送: ${cmd}`);
        const data = await apiCommand(cmd);
        if (data) updateUI(data);
    }

    async function sendPanelCommand(defaultCmd) {
        addLog(`> 指令发送: ${defaultCmd}`);
        const data = await apiCommand(defaultCmd);
        if (data) {
            updateUI(data);
            if (data.message) showPanelContent(defaultCmd, data.message);
            else if (data.room) showPanelContent(defaultCmd, data.room);
            else showPanelContent(defaultCmd, "后端未返回具体数据，请检查Java逻辑。");
        }
    }

    // =========================================================================
    // 【弹窗系统】
    // =========================================================================
    function showPanelContent(title, message) {
        const overlay = document.getElementById('panel-overlay');
        document.getElementById('panel-title').innerText = `📋 ${title} 结果`;
        document.getElementById('panel-body').innerHTML = `
            <div class="list-item">
                <span style="white-space: pre-line; font-size: 1rem;">${message}</span>
            </div>
            ${title.includes('背包') ? `<div style="margin-top:10px;"><b>📦 背包列表：</b><br>${tempInventory.map(i => `<span style="display:block;">- ${i}</span>`).join('')}</div>` : ''}
        `;
        overlay.classList.add('open');
    }

    function togglePanel(type) {
        const overlay = document.getElementById('panel-overlay');
        if(type === 'close' || overlay.classList.contains('open')) {
            overlay.classList.remove('open');
            return;
        }
    }

    // =========================================================================
    // 【日志系统】
    // =========================================================================
    function addLog(text) {
        const logBox = document.getElementById('game-log');
        logBox.innerText = `📜 ${text}`;
    }

    // =========================================================================
    // 【初始化游戏】
    // =========================================================================
    async function initGame() {
        addLog("正在连接 Spring Boot 后端...");
        const data = await apiCommand('查看');
        if (data) {
            updateUI(data);
            addLog("✅ 成功连上后端！点击按钮开始你的羊皮纸冒险吧！");
        } else {
            addLog("❌ 连不上后端！请确保 Java 进程已启动！");
        }
    }

    initGame();
</script>
</body>
</html>
